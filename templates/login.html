<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homlamoon - Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1F9C1;</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #F5E6D0 0%, #E8D5B7 50%, #D4A574 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #FFF8F0;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(139, 90, 43, 0.2);
      width: 360px;
      max-width: 90vw;
      border: 1px solid rgba(139, 90, 43, 0.15);
    }
    .logo {
      text-align: center; margin-bottom: 1.5rem;
    }
    .logo span { font-size: 2.5rem; }
    .logo h1 {
      font-size: 1.5rem; color: #5D4037; margin-top: 0.3rem;
      font-weight: 700;
    }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block; font-size: 0.85rem; color: #8D6E63;
      margin-bottom: 0.3rem; font-weight: 600;
    }
    input {
      width: 100%; padding: 0.7rem 0.9rem;
      border: 2px solid #D7CCC8; border-radius: 8px;
      font-size: 1rem; background: #FFF;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #A1887F; }
    .btn {
      width: 100%; padding: 0.75rem;
      background: #8D6E63; color: #FFF;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #6D4C41; }
    .error {
      background: #FFEBEE; color: #C62828;
      padding: 0.6rem 0.8rem; border-radius: 8px;
      font-size: 0.85rem; margin-bottom: 1rem;
      text-align: center;
    }
    .hint {
      text-align: center; margin-top: 1rem;
      font-size: 0.8rem; color: #A1887F;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span>&#x1F9C1;</span>
      <h1>Homlamoon</h1>
    </div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div style="display:flex;gap:0.3rem">
          <input type="password" id="password" name="password" placeholder="Enter password" required style="flex:1">
          <button type="button" onclick="togglePw()" style="background:none;border:2px solid #D7CCC8;border-radius:8px;cursor:pointer;padding:0 10px;font-size:1.1rem;line-height:1">&#x1F441;</button>
        </div>
      </div>
      <script>
        function togglePw() {
          const inp = document.getElementById('password');
          inp.type = inp.type === 'password' ? 'text' : 'password';
        }
      </script>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="hint">Default: admin / admin123</div>
  </div>
</body>
</html>
